<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Novo Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Criar um Novo Usuário</h1>
        <p>Preencha o formulário abaixo para criar um novo usuário na API.</p>
        
        <!-- Formulário para criar usuário -->
        <form id="form-novo-usuario">
            <!-- Campo para o nome -->
            <input 
                type="text" 
                id="usuario-nome" 
                placeholder="Nome completo"
                required
            />
            
            <!-- Campo para o email -->
            <input 
                type="email" 
                id="usuario-email" 
                placeholder="E-mail"
                required
            />
            
            <!-- Campo para o telefone -->
            <input 
                type="tel" 
                id="usuario-telefone" 
                placeholder="Telefone"
                required
            />
            
            <!-- Botão para enviar -->
            <button type="submit">Criar Usuário</button>
        </form>
        
        <!-- Div para exibir a resposta -->
        <div id="resultado-usuario"></div>
    </div>

    <script src="criar-usuario.js"></script>
</body>
</html>
